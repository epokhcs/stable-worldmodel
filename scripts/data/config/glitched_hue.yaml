defaults:
  - _self_

hydra:
  output_subdir: null
  run:
    dir: .

world:
  num_envs: 8
  max_episode_steps: 100
  image_shape: [224, 224]

cache_dir: null
dataset_name: glitched_hue_tworoom

num_traj: 20000
seed: 3072

# Fraction of episodes with blue background + teleport enabled.
# Remaining episodes get green background + teleport disabled.
# We use green (not red) to keep strong visual contrast with the red agent.
blue_teleport_ratio: 0.5

# Teleport pixel configuration
teleport:
  position: [56.0, 112.0]  # Center of Room 1 (left side)
  radius: [10.0]
  color: [255, 255, 255]    # White marker

# Background hues chosen to maintain high contrast with the red agent
blue_hue: [0, 0, 255]
green_hue: [0, 180, 0]
